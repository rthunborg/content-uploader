name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start local Supabase
        run: npx supabase start
      - name: Reset local Supabase
        run: npx supabase db reset
      - name: Install Chromium dependencies
        run: npx playwright install --with-deps chromium
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Vitest
        run: npm test
      - name: Playwright and axe
        run: npm run e2e
      - name: Build worker image
        run: docker build -f worker/Dockerfile -t stena-worker-ci .
      - name: Smoke worker versions
        run: docker run --rm stena-worker-ci --versions
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
